<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Mesto</title>

    <script type="module" crossorigin src="./assets/index-DqRCPwmp.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-8hu3v6kX.css">
  </head>

  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          src="./assets/logo-C_QQpFK1.svg"
          alt="Логотип Mesto"
          class="header__logo"
        />
      </header>

      <main class="content">
        <section class="profile page__section">
          <div
            class="profile__image"
            id="profile-avatar"
          ></div>

          <div class="profile__info">
            <div class="profile__title-container">
              <h1 class="profile__title"></h1>

              <button
                type="button"
                class="profile__edit-button"
              ></button>
            </div>

            <p class="profile__description"></p>
          </div>

          <button
            type="button"
            class="profile__add-button"
          ></button>
        </section>

        <section class="places page__section">
          <ul class="places__list"></ul>
        </section>
      </main>

      <footer class="footer page__section">
        <p class="footer__copyright">
          © 2026 Mesto Russia
        </p>
      </footer>
    </div>

    <!-- popup profile -->
    <div class="popup popup_type_edit">
      <div class="popup__content">
        <button
          type="button"
          class="popup__close"
        ></button>

        <h2 class="popup__title">
          Редактировать профиль
        </h2>

        <form
          class="popup__form"
          name="edit-profile"
          novalidate
        >
          <input
            type="text"
            name="user-name"
            id="user-name"
            class="popup__input popup__input_type_name"
            placeholder="Имя"
            required
            minlength="2"
            maxlength="40"
            pattern="^[A-Za-zА-Яа-яЁё\-]+$"
            data-error-message="Разрешены только латинские, кириллические буквы и знаки дефиса"
          />

          <span
            class="popup__error"
            id="user-name-error"
          ></span>

          <input
            type="text"
            name="user-description"
            id="user-description"
            class="popup__input popup__input_type_description"
            placeholder="Занятие"
            required
            minlength="2"
            maxlength="200"
          />

          <span
            class="popup__error"
            id="user-description-error"
          ></span>

          <button
            type="submit"
            class="button popup__button popup__button_disabled"
            disabled
          >
            Сохранить
          </button>
        </form>
      </div>
    </div>

    <!-- popup card -->
    <div class="popup popup_type_new-card">
      <div class="popup__content">
        <button
          type="button"
          class="popup__close"
        ></button>

        <h2 class="popup__title">
          Новое место
        </h2>

        <form
          class="popup__form"
          name="new-place"
          novalidate
        >
          <input
            type="text"
            name="place-name"
            id="place-name"
            class="popup__input popup__input_type_card-name"
            placeholder="Название"
            required
            minlength="2"
            maxlength="30"
          />

          <span
            class="popup__error"
            id="place-name-error"
          ></span>

          <input
            type="url"
            name="place-link"
            id="place-link"
            class="popup__input popup__input_type_url"
            placeholder="Ссылка на картинку"
            required
          />

          <span
            class="popup__error"
            id="place-link-error"
          ></span>

          <button
            type="submit"
            class="button popup__button popup__button_disabled"
            disabled
          >
            Создать
          </button>
        </form>
      </div>
    </div>

    <!-- popup avatar -->
    <div class="popup popup_type_avatar">
      <div class="popup__content">
        <button
          type="button"
          class="popup__close"
        ></button>

        <h2 class="popup__title">
          Обновить аватар
        </h2>

        <form
          class="popup__form"
          name="edit-avatar"
          novalidate
        >
          <input
            type="url"
            name="user-avatar"
            id="user-avatar"
            class="popup__input popup__input_type_avatar"
            placeholder="Ссылка на изображение"
            required
          />

          <span
            class="popup__error"
            id="user-avatar-error"
          ></span>

          <button
            type="submit"
            class="button popup__button popup__button_disabled"
            disabled
          >
            Сохранить
          </button>
        </form>
      </div>
    </div>

    <!-- popup image -->
    <div class="popup popup_type_image">
      <div
        class="popup__content popup__content_content_image"
      >
        <button
          type="button"
          class="popup__close"
        ></button>

        <img
          src=""
          alt=""
          class="popup__image"
        />

        <p class="popup__caption"></p>
      </div>
    </div>

    <!-- popup confirm delete -->
    <div class="popup popup_type_confirm">
      <div class="popup__content">
        <button
          type="button"
          class="popup__close"
        ></button>
        
        <h2 class="popup__title">
          Вы уверены?
        </h2>
        
        <form
          class="popup__form"
          name="confirm-delete"
          novalidate
        >
          <button
            type="submit"
            class="button popup__button"
          >
            Да
          </button>
        </form>
      </div>
    </div>

    <!-- popup info (дополнительное задание) -->
    <div class="popup popup_type_info">
      <div class="popup__content popup__content_content_info">
        <button type="button" class="popup__close"></button>
        
        <h2 class="popup__title">Информация о карточке</h2>
        
        <div class="popup__info">
          <ul class="popup__list" id="info-list"></ul>
          
          <h3 class="popup__text">Лайкнули:</h3>
          <ul class="popup__list" id="users-list"></ul>
        </div>
      </div>
    </div>

    <!-- templates -->
    <template id="card-template">
      <li class="places__item card">
        <div class="card__control">
          <button
            type="button"
            class="card__control-button card__control-button_type_info"
          ></button>

          <button
            type="button"
            class="card__control-button card__control-button_type_delete"
          ></button>
        </div>

        <img
          class="card__image"
          src=""
          alt=""
        />

        <div class="card__description">
          <h2 class="card__title"></h2>

          <div class="card__like-container">
            <button
              type="button"
              class="card__like-button"
            ></button>

            <p class="card__like-count">0</p>
          </div>
        </div>
      </li>
    </template>

    <template id="popup-info-definition-template">
      <li class="popup-info__item">
        <span class="popup-info__term"></span>
        <span class="popup-info__definition"></span>
      </li>
    </template>

    <template id="popup-info-user-preview-template">
      <li class="popup-info__user">
        <img class="popup-info__user-avatar" />
        <span class="popup-info__user-name"></span>
      </li>
    </template>

  </body>
</html>
